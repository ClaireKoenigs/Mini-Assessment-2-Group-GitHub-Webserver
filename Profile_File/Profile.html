<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="/style.css">
    <script src="Profile.js" defer></script>
</head>

<body>
    <nav>
        <li>
            <a href="/index.html">Home</a>
        </li>
    </nav>
    <h1>Your Profile</h1>
    <div id="ProfileInfo">
        <div id="ProfilePic">
            <img id="Picture" style="height:150px;width:150px;" src="user.png" alt="placeholder">
            <br><br>
            <button id="PicChange">Change Profile Picture</button>
            <div id="ImageSelect">
                <h2>Pick an image</h2>
                <input type="file" id="InputFile" accept="image/*">
                <button id="Submit" style="width:min-content;">Change</button>
            </div>
        </div>
        <div id="Info">
            <h4>Username</h4>
            <p id="Username">placeholder1234</p>
            <h4>Email</h4>
            <p id="Email">placehoder@placeholder.com</p>
            <h4>Favorate Genre</h4>
            <input type="text" id="Genre">
            <br>
            <button type="button" id="Save"><b>Save</b></button>
        </div>
    </div>
</body>

</html>
